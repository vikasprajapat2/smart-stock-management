<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keya Fusion ERP - Smart Stock Logistics Suite</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
  window.addEventListener('error', function(e) {
    document.body.innerHTML = '<div style="color:red;padding:20px;z-index:9999;position:absolute;background:white;width:100%;height:100%;">' + 
      '<h2>Runtime Error</h2>' + 
      '<pre>' + e.message + '\n' + e.filename + ':' + e.lineno + ':' + e.colno + '\n\n' + e.error?.stack + '</pre>' + 
      '</div>';
  });
  window.addEventListener('unhandledrejection', function(e) {
    document.body.innerHTML = '<div style="color:red;padding:20px;z-index:9999;position:absolute;background:white;width:100%;height:100%;">' + 
      '<h2>Unhandled Promise Rejection</h2>' + 
      '<pre>' + e.reason + '</pre>' + 
      '</div>';
  });
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
